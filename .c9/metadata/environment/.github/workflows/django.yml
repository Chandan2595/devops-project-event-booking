{"changed":true,"filter":false,"title":"django.yml","tooltip":"/.github/workflows/django.yml","value":"name: Django DevOps CI/CD Pipeline\n\non:\n  push:\n    branches:\n      - main\n\njobs:\n\n  stage1_prebuild:\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout repo\n        uses: actions/checkout@v3\n\n      - name: Set up Python\n        uses: actions/setup-python@v4\n        with:\n          python-version: \"3.11\"\n\n      - name: Install Python Dependencies\n        run: |\n          python -m pip install --upgrade pip\n          pip install -r requirements.txt\n\n      - name: Install OS Dependencies\n        run: |\n          sudo apt-get update\n          sudo apt-get install -y jq unzip wget\n\n      - name: Install Java 17 (Amazon Corretto)\n        run: |\n          sudo apt-get purge -y openjdk*\n          sudo apt-get install -y java-common\n          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb\n          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb\n          export PATH=$JAVA_HOME/bin:$PATH\n          echo \"$java -version\"\n          echo \"Java version: $(java --version)\"\n          echo \"Java installation done\"\n\n  stage2_build_and_test:\n    runs-on: ubuntu-latest\n    needs: stage1_prebuild\n\n    steps:\n      - name: Checkout repo\n        uses: actions/checkout@v3\n\n      - name: Set up Python\n        uses: actions/setup-python@v4\n        with:\n          python-version: \"3.11\"\n\n      - name: Install Dependencies\n        run: |\n          pip install --upgrade pip\n          pip install -r requirements.txt\n          pip install pylint coverage\n\n      - name: Run Pylint\n        continue-on-error: true\n        run: |\n          pylint $(git ls-files '*.py' | grep -Ev 'migrations|\\.c9') || true\n      \n      - name: Run django tests\n        run: |\n          coverage run --source='.' manage.py test  # Add --source flag\n          coverage xml -i  # -i ignores errors\n\n\n      - name: Install Sonar Scanner\n        run: |\n          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip\n          unzip sonar-scanner-cli-5.0.1.3006-linux.zip\n          mv sonar-scanner-5.0.1.3006-linux sonar-scanner\n          echo \"${{ github.workspace }}/sonar-scanner/bin\" >> $GITHUB_PATH\n\n      - name: Version\n        run: |\n          sonar-scanner --version\n\n      - name: Run Sonar Cloud Scan\n        env:\n          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}\n          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}\n          SONAR_ORG: ${{ secrets.SONAR_ORG }}\n        run: |\n          sonar-scanner \\\n            -Dsonar.login=$SONAR_TOKEN \\\n            -Dsonar.host.url=https://sonarcloud.io \\\n            -Dsonar.projectKey=$SONAR_PROJECT_KEY \\\n            -Dsonar.organization=$SONAR_ORG \\\n            -Dsonar.sources=. \\\n            -Dsonar.python.coverage.reportPaths=coverage.xml \\\n            -Dsonar.exclusions=.c9/**,**/migrations/**,**/__pycache__/**,**/tests.py \\\n            -Dsonar.coverage.exclusions=**/*\n      \n          sleep 5\n          curl \"https://sonarcloud.io/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY\" > sonar_result.json\n          cat sonar_result.json\n          \n      \n      # Add this after your SonarCloud scan, still inside build_and_test job\n      - name: Create deployment package\n        run: |\n          # Create a clean zip file for deployment\n          zip -r deploy.zip . \\\n            -x \"*.git*\" \\\n            -x \"*__pycache__*\" \\\n            -x \"*.pyc\" \\\n            -x \".c9/*\" \\\n            -x \"coverage.xml\" \\\n            -x \".coverage\" \\\n            -x \"sonar-scanner*\" \\\n            -x \"*.zip\" \\\n            -x \".pytest_cache/*\" \\\n            -x \".github/*\"\n      \n      - name: Upload deployment artifact\n        uses: actions/upload-artifact@v4\n        with:\n          name: deploy-package\n          path: deploy.zip\n          retention-days: 5\n\n  stage3_deploy:\n    runs-on: ubuntu-latest\n    needs: stage2_build_and_test\n\n    steps:\n      - name: Download artifact\n        uses: actions/download-artifact@v4\n        with:\n          name: deploy-package\n\n      - name: Configure AWS Credentials\n        uses: aws-actions/configure-aws-credentials@v2\n        with:\n          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}\n          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}\n          aws-region: us-east-1\n\n      - name: Deploy to Elastic Beanstalk\n        uses: einaregilsson/beanstalk-deploy@v21\n        with:\n          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}\n          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}\n          application_name: Devops-eb-x23282061\n          environment_name: Devops-eb-x23282061-env\n          region: us-east-1\n          version_label: \"build-${{ github.run_number }}\"\n          deployment_package: deploy.zip\n          wait_for_deployment: false\n          \n","undoManager":{"mark":8,"position":8,"stack":[[{"start":{"row":69,"column":59},"end":{"row":69,"column":60},"action":"insert","lines":[","],"id":72}],[{"start":{"row":69,"column":60},"end":{"row":69,"column":64},"action":"insert","lines":[",.c9"],"id":73}],[{"start":{"row":69,"column":60},"end":{"row":69,"column":61},"action":"remove","lines":[","],"id":74}],[{"start":{"row":67,"column":0},"end":{"row":68,"column":69},"action":"remove","lines":["          # pylint events --ignore=migrations || true","          # pylint $(git ls-files '*.py') --ignore=migrations || true"],"id":75},{"start":{"row":66,"column":14},"end":{"row":67,"column":0},"action":"remove","lines":["",""]}],[{"start":{"row":67,"column":72},"end":{"row":68,"column":0},"action":"insert","li